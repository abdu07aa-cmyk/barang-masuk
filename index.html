<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Report Barang Masuk - Mobile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f1f5f9;
  padding: 16px;
  min-height: 100vh;
}

.container {
  max-width: 480px;
  margin: 0 auto;
}

/* Header Styles */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.app-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.badge {
  background: white;
  padding: 6px 12px;
  border-radius: 40px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #2563eb;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* Card Styles */
.card {
  background: white;
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px -8px rgba(0,0,0,0.1);
  border: 1px solid rgba(226, 232, 240, 0.6);
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.card-header h3 {
  font-size: 1.2rem;
  font-weight: 600;
  color: #0f172a;
  flex: 1;
}

.card-header-icon {
  width: 40px;
  height: 40px;
  background: #eef2ff;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  color: #2563eb;
}

/* Form Styles */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.input-field {
  position: relative;
}

.input-field label {
  font-size: 0.8rem;
  font-weight: 600;
  color: #64748b;
  margin-bottom: 4px;
  display: block;
  margin-left: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.input-field input,
.input-field select {
  width: 100%;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1.5px solid #e2e8f0;
  font-size: 15px;
  background: #f8fafc;
  outline: none;
  transition: all 0.2s;
}

.input-field input:focus,
.input-field select:focus {
  border-color: #2563eb;
  background: white;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
}

/* Table Styles */
.table-wrapper {
  background: #f8fafc;
  border-radius: 20px;
  border: 1.5px solid #e2e8f0;
  overflow: hidden;
  margin: 16px 0;
}

.table-responsive {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 580px;
  font-size: 13px;
}

th {
  background: #f1f4f9;
  color: #334155;
  font-weight: 600;
  padding: 14px 8px;
  white-space: nowrap;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

td {
  padding: 12px 8px;
  border-bottom: 1px solid #e2e8f0;
  color: #1e293b;
  font-weight: 500;
}

tr:last-child td {
  border-bottom: none;
}

/* Button Styles */
.btn {
  padding: 14px 20px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 15px;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  width: 100%;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: #2563eb;
  color: white;
  box-shadow: 0 8px 18px -8px #2563eb;
}

.btn-success {
  background: #16a34a;
  color: white;
  box-shadow: 0 8px 18px -8px #16a34a;
}

.btn-danger {
  background: #dc2626;
  color: white;
  box-shadow: 0 8px 18px -8px #dc2626;
}

.btn-warning {
  background: #d97706;
  color: white;
  box-shadow: 0 8px 18px -8px #d97706;
}

.btn-outline {
  background: white;
  border: 1.5px solid #2563eb;
  color: #2563eb;
  box-shadow: none;
}

.btn-small {
  padding: 8px 16px;
  font-size: 12px;
  border-radius: 30px;
  width: auto;
  margin: 2px;
}

/* Filter Grid */
.filter-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}

.filter-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Action Buttons Grid */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

/* Status Badge */
.status-badge {
  background: #e6f7e6;
  color: #16a34a;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  display: inline-block;
}

/* Divider */
.divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
  margin: 16px 0;
}

/* Helper Classes */
.text-center { text-align: center; }
.text-small { font-size: 0.75rem; color: #64748b; }
.mt-2 { margin-top: 8px; }
.mb-2 { margin-bottom: 8px; }
.font-bold { font-weight: 600; }

/* Input Table Specific */
#inputTable td select,
#inputTable td input {
  width: 100%;
  padding: 10px;
  border-radius: 16px;
  border: 1.5px solid #e2e8f0;
  background: white;
  font-size: 12px;
}

#inputTable .btn-small {
  padding: 8px 12px;
  white-space: nowrap;
}

/* Edit Mode Styles */
.edit-mode input,
.edit-mode select {
  border: 2px solid #2563eb;
  background: white;
}
</style>
</head>
<body>

<div class="container">
  
  <!-- App Header -->
  <div class="app-header">
    <h1>📦 StockMaster</h1>
    <span class="badge">v2.0 · Mobile</span>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">📥</div>
      <h3>Input Barang Masuk</h3>
    </div>
    
    <div class="input-group">
      <div class="input-field">
        <label>Tanggal</label>
        <input type="date" id="tanggal">
      </div>
      <div class="input-field">
        <label>Nama Brand</label>
        <input type="text" id="brand" placeholder="Contoh: BRAND ABC">
      </div>
    </div>

    <div class="table-wrapper">
      <div class="table-responsive">
        <table id="inputTable">
          <tr><th>Jenis</th><th>Paper</th><th>Size</th><th>Qty</th><th>Aksi</th></tr>
        </table>
      </div>
    </div>

    <div class="action-grid">
      <button id="btnTambah" class="btn btn-outline">+ Tambah Baris</button>
      <button id="btnSimpan" class="btn btn-success">💾 Simpan Semua</button>
    </div>
  </div>

  <!-- Data Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon">🔍</div>
      <h3>Data Tersimpan</h3>
    </div>
    
    <!-- Filter Section -->
    <div class="filter-grid">
      <div class="filter-row">
        <div class="input-field">
          <label>Filter Tanggal</label>
          <input type="date" id="filterTanggal" placeholder="Pilih tanggal">
        </div>
        <div class="input-field">
          <label>Cari Brand</label>
          <input type="text" id="filterBrand" placeholder="Ketik brand...">
        </div>
      </div>
      
      <div class="filter-row">
        <div class="input-field">
          <label>Jenis</label>
          <select id="filterJenis"><option value="">Semua Jenis</option></select>
        </div>
        <div class="input-field">
          <label>Paper</label>
          <select id="filterPaper"><option value="">Semua Paper</option></select>
        </div>
      </div>
      
      <div class="filter-row">
        <div class="input-field">
          <label>Size</label>
          <select id="filterSize"><option value="">Semua Size</option></select>
        </div>
        <div class="input-field" style="display: flex; align-items: flex-end;">
          <button class="btn btn-outline btn-small" id="btnResetFilter" style="width: 100%;">⟲ Reset</button>
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="table-wrapper">
      <div class="table-responsive">
        <table id="dataTable">
          <tr><th>Tanggal</th><th>Brand</th><th>Jenis</th><th>Paper</th><th>Size</th><th>Qty</th><th>Aksi</th></tr>
        </table>
      </div>
    </div>

    <!-- Export Actions -->
    <div class="action-grid">
      <button id="btnExcelTable" class="btn btn-primary">📄 Export Excel</button>
      <button id="btnWATable" class="btn btn-success">📲 Kirim WA</button>
    </div>
    
    <div class="divider"></div>
    
    <div class="text-center">
      <span class="status-badge">✨ Data terfilter akan diekspor</span>
    </div>
    <div class="text-small text-center mt-2">
      Total data: <span id="totalData" class="font-bold">0</span> item
    </div>
  </div>
</div>

<script>
// ============== FUNGSI ASLI TIDAK BERUBAH ==============
function formatTanggal(tgl){
  if(!tgl) return "";
  const [y,m,d] = tgl.split("-");
  return `${d}/${m}/${y}`;
}

function formatTanggalDB(tgl){
  const [d,m,y] = tgl.split("/");
  return `${y}-${m}-${d}`;
}

document.addEventListener("DOMContentLoaded", ()=>{

const supabase = window.supabase.createClient(
  "https://dggspzjibisapdaowkkj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZ3NwemppYmlzYXBkYW93a2tqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4NjMxNzksImV4cCI6MjA4MzQzOTE3OX0.DtDb10SzKfwJg3bbVq53nG9RIXbZYtitXn67ZtdBMFY"
);

const jenis=["BOOKLET","FILTER WHITE","FILTER BROWN","FILTER PRINTED","DISPLAY","LAYER BOX","PLAT","MAGNET","DOUBLE TAPE","COVER","PAPER",
"MIKA","JAR","STICKER JAR","STICKER MIKA","STICKER FILTER","STICKER BULAT BESAR","STICKER BULAT KECIL","TUBE","FILTER GREEN","FILTER WHITE","FILTER BLUE","FILTER 21","FILTER 26",
"FILTER 30","FILTER 40","TRAPEZOID","HOLDER S","HOLDER M","HOLDER L","HOLDER 9X9","HOLDER 10X10"];
const paper=["32 LEAVES","33 LEAVES","35 LEAVES","40 LEAVES","42 LEAVES","50 LEAVES","51 LEAVES","52 LEAVES",
"60 LEAVES","70 MM","83 MM","84 MM","98 MM","109 MM","110 MM"];
const size=["1 1/4","18X6,5","18X8","SINGLE","KS","KSS","KSSS","SKS","3 CONES/PACK","6 CONES/PACK","8 CONES/PACK","700 CONES/BOX",
"729 CONES/BOX","900 CONES/BOX","50 CONES/JARS","800 CONES/BOX","1000 CONES/BOX"];
const opt=l=>'<option></option>'+l.map(v=>`<option>${v}</option>`).join('');

// ================= Filter Select ===================
function isiFilter(){
  filterJenis.innerHTML = '<option value="">Semua Jenis</option>'+jenis.map(v=>`<option>${v}</option>`).join('');
  filterPaper.innerHTML = '<option value="">Semua Paper</option>'+paper.map(v=>`<option>${v}</option>`).join('');
  filterSize.innerHTML = '<option value="">Semua Size</option>'+size.map(v=>`<option>${v}</option>`).join('');
}

// ================= Filter Table ===================
function filterTable(){
  const tgl = filterTanggal.value ? formatTanggal(filterTanggal.value) : "";
  const brand = filterBrand.value.toLowerCase();
  const jenisVal = filterJenis.value;
  const paperVal = filterPaper.value;
  const sizeVal  = filterSize.value;

  let visibleCount = 0;
  [...dataTable.rows].slice(1).forEach(r=>{
    const cocok =
      (!tgl || r.cells[0].textContent === tgl) &&
      (!brand || r.cells[1].textContent.toLowerCase().includes(brand)) &&
      (!jenisVal || r.cells[2].textContent === jenisVal) &&
      (!paperVal || r.cells[3].textContent === paperVal) &&
      (!sizeVal || r.cells[4].textContent === sizeVal);

    r.style.display = cocok ? "" : "none";
    if(cocok) visibleCount++;
  });
  
  // Update total data
  const totalSpan = document.getElementById('totalData');
  if(totalSpan) totalSpan.textContent = visibleCount;
}

// ================= Input Table ===================
function tambahBaris(){
  const r=inputTable.insertRow(-1);
  r.innerHTML=`<td><select>${opt(jenis)}</select></td>
  <td><select>${opt(paper)}</select></td>
  <td><select>${opt(size)}</select></td>
  <td><input type="number" min="1"></td>
  <td><button class="btn-danger btn-small" onclick="this.closest('tr').remove()">✕</button></td>`;
}

// ================= Data Table ===================
function addRowToTable(d){
  const tr=document.createElement('tr');
  tr.dataset.id=d.id;
  tr.innerHTML=`<td>${formatTanggal(d.tanggal)}</td>
<td>${d.brand}</td><td>${d.jenis}</td><td>${d.paper}</td>
<td>${d.size}</td><td>${d.qty}</td>
<td><button class="btn-warning btn-small" onclick="editRow(this)">Edit</button>
<button class="btn-danger btn-small" onclick="deleteRow(this)">Hapus</button></td>`;
  dataTable.appendChild(tr);
}

// ================= Load Data ===================
async function loadData(){
 const { data } = await supabase
  .from("barang_masuk")
  .select("*")
  .order("tanggal", { ascending: false })
  .order("id", { ascending: false });
  dataTable.innerHTML='<tr><th>Tanggal</th><th>Brand</th><th>Jenis</th><th>Paper</th><th>Size</th><th>Qty</th><th>Aksi</th></tr>';
  data.forEach(d=>addRowToTable(d));
  isiFilter(); 

  filterTanggal.value = "";
  filterBrand.value = "";
  filterJenis.value = "";
  filterPaper.value = "";
  filterSize.value = "";
  filterTable(); 
}

// ================= Simpan Data ===================
async function simpan(){
  if(!tanggal.value||!brand.value){ alert("Tanggal & Brand wajib diisi"); return; }
  const rows=[...inputTable.rows].slice(1);
  if(rows.length===0){ alert("Tidak ada data"); return; }

  const dataToInsert = rows.map(r=>{
    const e=r.querySelectorAll("select,input");
    return {tanggal:tanggal.value,brand:brand.value,jenis:e[0].value,paper:e[1].value,size:e[2].value,qty:+e[3].value};
  });

  const { error, data } = await supabase.from("barang_masuk").insert(dataToInsert).select();
  if(error){ alert(error.message); return; }

  inputTable.innerHTML='<tr><th>Jenis</th><th>Paper</th><th>Size</th><th>Qty</th><th>Aksi</th></tr>';
  data.forEach(d=>addRowToTable(d));
  filterTable();
  alert("✅ Data tersimpan");
}

// ================= Edit & Delete ===================

window.editRow = function(btn){
  const tr = btn.closest('tr');
  const id = tr.dataset.id;

  const tanggalText = formatTanggalDB(tr.cells[0].textContent);
  const brandText   = tr.cells[1].textContent;
  const jenisText   = tr.cells[2].textContent;
  const paperText   = tr.cells[3].textContent;
  const sizeText    = tr.cells[4].textContent;
  const qtyText     = tr.cells[5].textContent;

  tr.dataset.oldTanggal = tanggalText;
  tr.dataset.oldBrand   = brandText;

  tr.innerHTML = `
    <td><input type="date" value="${tanggalText}" style="padding:8px; border-radius:12px;"></td>
    <td><input type="text" value="${brandText}" style="padding:8px; border-radius:12px;"></td>
    <td><select style="padding:8px; border-radius:12px;">${opt(jenis)}</select></td>
    <td><select style="padding:8px; border-radius:12px;">${opt(paper)}</select></td>
    <td><select style="padding:8px; border-radius:12px;">${opt(size)}</select></td>
    <td><input type="number" min="1" value="${qtyText}" style="padding:8px; width:70px; border-radius:12px;"></td>
    <td>
      <button class="btn-success btn-small" onclick="saveEdit(this)">✓</button>
      <button class="btn-danger btn-small" onclick="cancelEdit(this,'${tanggalText}','${brandText}','${jenisText}','${paperText}','${sizeText}','${qtyText}')">✕</button>
    </td>
  `;

  tr.cells[2].querySelector('select').value = jenisText;
  tr.cells[3].querySelector('select').value = paperText;
  tr.cells[4].querySelector('select').value = sizeText;
};

window.cancelEdit = function(btn,tanggal,brand,jenis,paper,size,qty){
  const tr=btn.closest('tr');
  tr.innerHTML=`<td>${formatTanggal(tanggal)}</td>
<td>${brand}</td><td>${jenis}</td><td>${paper}</td><td>${size}</td><td>${qty}</td>
<td><button class="btn-warning btn-small" onclick="editRow(this)">Edit</button>
<button class="btn-danger btn-small" onclick="deleteRow(this)">Hapus</button></td>`;
}

window.saveEdit = async function(btn){
  const tr=btn.closest('tr');
  const id=tr.dataset.id;
  const tanggal=tr.cells[0].querySelector('input').value;
  const brand=tr.cells[1].querySelector('input').value;
  const jenis=tr.cells[2].querySelector('select').value;
  const paper=tr.cells[3].querySelector('select').value;
  const size=tr.cells[4].querySelector('select').value;
  const qty=tr.cells[5].querySelector('input').value;
  const oldTanggal = tr.dataset.oldTanggal;
const oldBrand   = tr.dataset.oldBrand;

if(tanggal !== oldTanggal || brand !== oldBrand){
  const ok = confirm(
    "⚠️ PERHATIAN\n\n" +
    "Tanggal / Brand berubah.\n" +
    "Perubahan ini HANYA berlaku untuk baris ini.\n\n" +
    "Yakin lanjut?"
  );
  if(!ok) return;
}

  const { error }=await supabase.from("barang_masuk").update({tanggal,brand,jenis,paper,size,qty:+qty}).eq('id',id);
  if(error){ alert(error.message); return; }

  tr.innerHTML=`<td>${formatTanggal(tanggal)}</td>
<td>${brand}</td><td>${jenis}</td><td>${paper}</td><td>${size}</td><td>${qty}</td>
<td><button class="btn-warning btn-small" onclick="editRow(this)">Edit</button>
<button class="btn-danger btn-small" onclick="deleteRow(this)">Hapus</button></td>`;
  filterTable();
}

window.deleteRow = async function(btn){
  if(!confirm("Yakin hapus data ini?")) return;
  const tr=btn.closest('tr');
  const id=tr.dataset.id;
  const { error }=await supabase.from("barang_masuk").delete().eq('id',id);
  if(error){ alert(error.message); return; }
  tr.remove();
  filterTable();
}

// ================= Export Excel Filtered ===================
function exportExcelTable(){
  let rows = [...dataTable.rows]
    .slice(1)
    .filter(r => r.style.display !== "none");

  if(rows.length === 0){
    alert("Tidak ada data terfilter");
    return;
  }

  rows.sort((a,b)=>{
    const [da,ma,ya] = a.cells[0].textContent.split('/');
    const [db,mb,yb] = b.cells[0].textContent.split('/');
    return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
  });

  const data = rows.map(r=>({
    Tanggal: r.cells[0].textContent,
    Brand: r.cells[1].textContent,
    Jenis: r.cells[2].textContent,
    Paper: r.cells[3].textContent,
    Size: r.cells[4].textContent,
    Qty: Number(r.cells[5].textContent)
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Barang Masuk");
  XLSX.writeFile(wb,"barang_masuk_filtered.xlsx");
}

// ================= WA Filtered ===================
function sendWATable(){
  const rows = [...dataTable.rows].slice(1).filter(r=>r.style.display!=="none");
  if(rows.length===0){ 
    alert("Tidak ada data terfilter"); 
    return; 
  }

  let txt = "📦 *REPORT BARANG MASUK*\n━━━━━━━━━━━━━━━━━━━━\n";
  rows.forEach(r=>{
    const brand = r.cells[1].textContent || "-";
    const jenis = r.cells[2].textContent || "-";
    const paper = r.cells[3].textContent || "-";
    const size = r.cells[4].textContent || "-";
    const qty = r.cells[5].textContent || "0";

    txt += `• ${brand} | ${jenis} | ${paper} | ${size} | Qty: *${qty}*\n`;
  });

  txt += "\n━━━━━━━━━━━━━━━━━━━━\n";
  const now = new Date();
  txt += `🕐 Generated: ${now.toLocaleDateString()} , ${now.toLocaleTimeString()}`;

  window.open("https://wa.me/?text="+encodeURIComponent(txt));
}

// ================= Tombol ===================
btnTambah.onclick=tambahBaris;
btnSimpan.onclick=simpan;
btnExcelTable.onclick=exportExcelTable;
btnWATable.onclick=sendWATable;

filterTanggal.onchange = filterTable;
filterBrand.onkeyup    = filterTable;
filterJenis.onchange   = filterTable;
filterPaper.onchange   = filterTable;
filterSize.onchange    = filterTable;

btnResetFilter.onclick = ()=>{
  filterTanggal.value="";
  filterBrand.value="";
  filterJenis.value="";
  filterPaper.value="";
  filterSize.value="";
  filterTable();
};

loadData();

});
</script>
</body>
</html>
