<script>

  alert("Error: " + msg + "\nCek console untuk detail (F12)");
  return false;

// ============== KONFIGURASI SUPABASE ==============
const supabase = window.supabase.createClient(
  "https://dggspzjibisapdaowkkj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnZ3NwemppYmlzYXBkYW93a2tqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4NjMxNzksImV4cCI6MjA4MzQzOTE3OX0.DtDb10SzKfwJg3bbVq53nG9RIXbZYtitXn67ZtdBMFY"
);

// ============== CEK KONEKSI ==============
async function cekKoneksi() {
  try {
    console.log("🔌 Mencoba konek ke Supabase...");
    const { data, error } = await supabase
      .from("barang_masuk")
      .select("count", { count: 'exact', head: true });

// ============== DATA DROPDOWN ==============
const jenis = ["BOOKLET","FILTER WHITE","FILTER BROWN","FILTER PRINTED","DISPLAY","LAYER BOX","PLAT","MAGNET","DOUBLE TAPE","COVER","PAPER",
  "MIKA","JAR","STICKER JAR","STICKER MIKA","STICKER FILTER","STICKER BULAT BESAR","STICKER BULAT KECIL","TUBE","FILTER GREEN","FILTER WHITE","FILTER BLUE","FILTER 21","FILTER 26",
  "FILTER 30","FILTER 40","TRAPEZOID","HOLDER S","HOLDER M","HOLDER L","HOLDER 9X9","HOLDER 10X10"];

const paper = ["32 LEAVES","33 LEAVES","35 LEAVES","40 LEAVES","42 LEAVES","50 LEAVES","51 LEAVES","52 LEAVES",
  "60 LEAVES","70 MM","83 MM","84 MM","98 MM","109 MM","110 MM"];

const size = ["1 1/4","18X6,5","18X8","SINGLE","KS","KSS","KSSS","SKS","3 CONES/PACK","6 CONES/PACK","8 CONES/PACK","700 CONES/BOX",
  "729 CONES/BOX","900 CONES/BOX","50 CONES/JARS","800 CONES/BOX","1000 CONES/BOX"];

// ============== FUNGSI FORMAT TANGGAL ==============
function formatTanggal(tgl) {
  if(!tgl) return "-";
  try {
    const [y,m,d] = tgl.split("-");
    return `${d}/${m}/${y}`;
  } catch {
    return tgl;
  }
}

function formatTanggalDB(tgl) {
  if(!tgl) return "";
  try {
    const [d,m,y] = tgl.split("/");
    return `${y}-${m}-${d}`;
  } catch {
    return tgl;
  }
}

// ============== ELEMEN ==============
const dataTable = document.getElementById('dataTable');
const filterTanggal = document.getElementById('filterTanggal');
const filterBrand = document.getElementById('filterBrand');
const filterJenis = document.getElementById('filterJenis');
const filterPaper = document.getElementById('filterPaper');
const filterSize = document.getElementById('filterSize');
const btnResetFilter = document.getElementById('btnResetFilter');
const btnExcelTable = document.getElementById('btnExcelTable');
const btnWATable = document.getElementById('btnWATable');
const totalSpan = document.getElementById('totalData');

// ============== ISI FILTER DROPDOWN ==============
function isiFilterDropdown() {
  console.log("📋 Mengisi dropdown filter...");
  
  // Filter Jenis
  filterJenis.innerHTML = '<option value="">Semua Jenis</option>';
  jenis.forEach(v => {
    const option = document.createElement('option');
    option.value = v;
    option.textContent = v;
    filterJenis.appendChild(option);
  });
  
  // Filter Paper
  filterPaper.innerHTML = '<option value="">Semua Paper</option>';
  paper.forEach(v => {
    const option = document.createElement('option');
    option.value = v;
    option.textContent = v;
    filterPaper.appendChild(option);
  });
  
  // Filter Size
  filterSize.innerHTML = '<option value="">Semua Size</option>';
  size.forEach(v => {
    const option = document.createElement('option');
    option.value = v;
    option.textContent = v;
    filterSize.appendChild(option);
  });
  
  console.log("✅ Dropdown filter siap");
}

// ============== FILTER TABLE ==============
function filterTable() {
  const tgl = filterTanggal.value ? formatTanggal(filterTanggal.value) : "";
  const brand = filterBrand.value.toLowerCase().trim();
  const jenisVal = filterJenis.value;
  const paperVal = filterPaper.value;
  const sizeVal = filterSize.value;

  let visibleCount = 0;
  
  [...dataTable.rows].slice(1).forEach(r => {
    // Skip baris pesan "Belum ada data"
    if (r.cells.length === 1 && r.cells[0].colSpan === 7) {
      return;
    }
    
    const cocok =
      (!tgl || r.cells[0]?.textContent === tgl) &&
      (!brand || r.cells[1]?.textContent.toLowerCase().includes(brand)) &&
      (!jenisVal || r.cells[2]?.textContent === jenisVal) &&
      (!paperVal || r.cells[3]?.textContent === paperVal) &&
      (!sizeVal || r.cells[4]?.textContent === sizeVal);

    r.style.display = cocok ? "" : "none";
    if(cocok) visibleCount++;
  });
  
  totalSpan.textContent = visibleCount + ' item ditemukan';
}

// ============== TAMBAH BARIS KE TABLE ==============
function addRowToTable(d) {
  try {
    const tr = document.createElement('tr');
    tr.dataset.id = d.id;
    
    const tanggalStr = formatTanggal(d.tanggal);
    const brandStr = d.brand || '-';
    const jenisStr = d.jenis || '-';
    const paperStr = d.paper || '-';
    const sizeStr = d.size || '-';
    const qtyStr = d.qty || '0';
    
    tr.innerHTML = `
      <td>${tanggalStr}</td>
      <td>${brandStr}</td>
      <td>${jenisStr}</td>
      <td>${paperStr}</td>
      <td>${sizeStr}</td>
      <td>${qtyStr}</td>
      <td>
        <button class="btn-small" style="background:#d97706; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="editRow(this)">Edit</button>
        <button class="btn-small" style="background:#dc2626; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="deleteRow(this)">Hapus</button>
      </td>
    `;
    
    dataTable.appendChild(tr);
    
  } catch (err) {
    console.error("❌ Error add row:", err, d);
  }
}

// ============== LOAD DATA ==============
async function loadData() {
  try {
    console.log("📥 Loading data...");
    
    // Cek koneksi dulu
    await cekKoneksi();
    
    const { data, error } = await supabase
      .from("barang_masuk")
      .select("*")
      .order("tanggal", { ascending: false })
      .order("id", { ascending: false });
    
    if (error) {
      console.error("❌ Error loading:", error);
      alert("Error loading data: " + error.message);
      return;
    }
    
    console.log("✅ Data loaded:", data?.length || 0, "items");
    
    // Kosongkan tabel
    dataTable.innerHTML = '<tr><th>Tanggal</th><th>Brand</th><th>Jenis</th><th>Paper</th><th>Size</th><th>Qty</th><th>Aksi</th></tr>';
    
    if (!data || data.length === 0) {
      console.log("📭 Tidak ada data");
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="7" style="text-align:center; padding:40px; color:#64748b; font-size:1rem;">📭 Belum ada data. Silakan input data di halaman Input.</td>';
      dataTable.appendChild(tr);
      totalSpan.textContent = '0 item';
    } else {
      data.forEach(d => addRowToTable(d));
    }
    
    isiFilterDropdown();
    filterTable();
    
  } catch (err) {
    console.error("❌ Fatal error:", err);
    alert("Error fatal: " + err.message + "\nCek console (F12) untuk detail.");
  }
}

// ============== EDIT ROW ==============
window.editRow = function(btn) {
  const tr = btn.closest('tr');
  const id = tr.dataset.id;

  const tanggalText = formatTanggalDB(tr.cells[0].textContent);
  const brandText = tr.cells[1].textContent;
  const jenisText = tr.cells[2].textContent;
  const paperText = tr.cells[3].textContent;
  const sizeText = tr.cells[4].textContent;
  const qtyText = tr.cells[5].textContent;

  tr.dataset.oldTanggal = tanggalText;
  tr.dataset.oldBrand = brandText;

  tr.innerHTML = `
    <td><input type="date" value="${tanggalText}" style="padding:6px; width:100%; border-radius:12px; border:1px solid #ccc;"></td>
    <td><input type="text" value="${brandText}" style="padding:6px; width:100%; border-radius:12px; border:1px solid #ccc;"></td>
    <td><select style="padding:6px; width:100%; border-radius:12px;">${jenis.map(v => `<option>${v}</option>`).join('')}</select></td>
    <td><select style="padding:6px; width:100%; border-radius:12px;">${paper.map(v => `<option>${v}</option>`).join('')}</select></td>
    <td><select style="padding:6px; width:100%; border-radius:12px;">${size.map(v => `<option>${v}</option>`).join('')}</select></td>
    <td><input type="number" min="1" value="${qtyText}" style="padding:6px; width:80px; border-radius:12px; border:1px solid #ccc;"></td>
    <td>
      <button class="btn-small" style="background:#16a34a; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="saveEdit(this)">✓</button>
      <button class="btn-small" style="background:#dc2626; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="cancelEdit(this,'${tanggalText}','${brandText}','${jenisText}','${paperText}','${sizeText}','${qtyText}')">✕</button>
    </td>
  `;

  tr.cells[2].querySelector('select').value = jenisText;
  tr.cells[3].querySelector('select').value = paperText;
  tr.cells[4].querySelector('select').value = sizeText;
};

window.cancelEdit = function(btn, tanggal, brand, jenis, paper, size, qty) {
  const tr = btn.closest('tr');
  tr.innerHTML = `
    <td>${formatTanggal(tanggal)}</td>
    <td>${brand}</td>
    <td>${jenis}</td>
    <td>${paper}</td>
    <td>${size}</td>
    <td>${qty}</td>
    <td>
      <button class="btn-small" style="background:#d97706; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="editRow(this)">Edit</button>
      <button class="btn-small" style="background:#dc2626; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="deleteRow(this)">Hapus</button>
    </td>
  `;
};

window.saveEdit = async function(btn) {
  try {
    const tr = btn.closest('tr');
    const id = tr.dataset.id;
    const tanggal = tr.cells[0].querySelector('input').value;
    const brand = tr.cells[1].querySelector('input').value;
    const jenis = tr.cells[2].querySelector('select').value;
    const paper = tr.cells[3].querySelector('select').value;
    const size = tr.cells[4].querySelector('select').value;
    const qty = tr.cells[5].querySelector('input').value;
    
    const oldTanggal = tr.dataset.oldTanggal;
    const oldBrand = tr.dataset.oldBrand;

    if(tanggal !== oldTanggal || brand !== oldBrand) {
      const ok = confirm("⚠️ PERHATIAN\n\nTanggal/Brand berubah. Yakin lanjut?");
      if(!ok) return;
    }

    const { error } = await supabase
      .from("barang_masuk")
      .update({ tanggal, brand, jenis, paper, size, qty: +qty })
      .eq('id', id);
    
    if(error) {
      alert("❌ Error: " + error.message);
      return;
    }

    tr.innerHTML = `
      <td>${formatTanggal(tanggal)}</td>
      <td>${brand}</td>
      <td>${jenis}</td>
      <td>${paper}</td>
      <td>${size}</td>
      <td>${qty}</td>
      <td>
        <button class="btn-small" style="background:#d97706; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="editRow(this)">Edit</button>
        <button class="btn-small" style="background:#dc2626; color:white; border:none; padding:6px 10px; border-radius:20px; margin:2px; cursor:pointer;" onclick="deleteRow(this)">Hapus</button>
      </td>
    `;
    filterTable();
    
  } catch (err) {
    console.error("❌ Error save:", err);
    alert("Error: " + err.message);
  }
};

// ============== DELETE ROW ==============
window.deleteRow = async function(btn) {
  if(!confirm("Yakin hapus data ini?")) return;
  
  try {
    const tr = btn.closest('tr');
    const id = tr.dataset.id;
    
    const { error } = await supabase
      .from("barang_masuk")
      .delete()
      .eq('id', id);
    
    if(error) {
      alert("❌ Error: " + error.message);
      return;
    }
    
    tr.remove();
    filterTable();
    
  } catch (err) {
    console.error("❌ Error delete:", err);
    alert("Error: " + err.message);
  }
};

// ============== EXPORT EXCEL ==============
function exportExcelTable() {
  try {
    let rows = [...dataTable.rows]
      .slice(1)
      .filter(r => r.style.display !== "none" && r.cells.length > 1);

    if(rows.length === 0) {
      alert("Tidak ada data terfilter");
      return;
    }

    rows.sort((a,b) => {
      const [da,ma,ya] = a.cells[0].textContent.split('/');
      const [db,mb,yb] = b.cells[0].textContent.split('/');
      return new Date(ya, ma-1, da) - new Date(yb, mb-1, db);
    });

    const data = rows.map(r => ({
      Tanggal: r.cells[0].textContent,
      Brand: r.cells[1].textContent,
      Jenis: r.cells[2].textContent,
      Paper: r.cells[3].textContent,
      Size: r.cells[4].textContent,
      Qty: Number(r.cells[5].textContent)
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Barang Masuk");
    XLSX.writeFile(wb, "barang_masuk_filtered.xlsx");
    
  } catch (err) {
    console.error("❌ Error export:", err);
    alert("Error export: " + err.message);
  }
}

// ============== KIRIM WA ==============
function sendWATable() {
  try {
    const rows = [...dataTable.rows]
      .slice(1)
      .filter(r => r.style.display !== "none" && r.cells.length > 1);
      
    if(rows.length === 0) { 
      alert("Tidak ada data terfilter"); 
      return; 
    }

    let txt = "📦 *REPORT BARANG MASUK*\n━━━━━━━━━━━━━━━━━━━━\n";
    rows.forEach(r => {
      txt += `• ${r.cells[1].textContent} | ${r.cells[2].textContent} | ${r.cells[3].textContent} | ${r.cells[4].textContent} | Qty: *${r.cells[5].textContent}*\n`;
    });

    txt += "\n━━━━━━━━━━━━━━━━━━━━\n";
    const now = new Date();
    txt += `🕐 Generated: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

    window.open("https://wa.me/?text=" + encodeURIComponent(txt));
    
  } catch (err) {
    console.error("❌ Error WA:", err);
    alert("Error: " + err.message);
  }
}

// ============== EVENT LISTENER ==============
filterTanggal.addEventListener('change', filterTable);
filterBrand.addEventListener('keyup', filterTable);
filterJenis.addEventListener('change', filterTable);
filterPaper.addEventListener('change', filterTable);
filterSize.addEventListener('change', filterTable);

btnResetFilter.addEventListener('click', () => {
  filterTanggal.value = "";
  filterBrand.value = "";
  filterJenis.value = "";
  filterPaper.value = "";
  filterSize.value = "";
  filterTable();
});

btnExcelTable.addEventListener('click', exportExcelTable);
btnWATable.addEventListener('click', sendWATable);

// ============== MULAI ==============
document.addEventListener('DOMContentLoaded', () => {
  console.log("🚀 Aplikasi dimulai...");
  loadData();
});
</script>
