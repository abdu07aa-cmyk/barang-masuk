<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Gudang Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .login-card h2 { text-align: center; margin-bottom: 10px; color: #1e293b; }
        .login-card p { text-align: center; margin-bottom: 25px; color: #64748b; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .btn-secondary { background: #e2e8f0; color: #1e293b; margin-top: 10px; }
        .alert { padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .alert-success { background: #d1fae5; color: #065f46; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>📦 GUDANG PRO</h2>
        <p>Manajemen Inventory</p>
        <div id="msg"></div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <button id="registerBtn" class="btn-secondary">Daftar Akun</button>
    </div>

    <script>
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) window.location.href = 'dashboard.html';
        }
        checkSession();
        
        function showAlert(msg, type) {
            document.getElementById('msg').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => document.getElementById('msg').innerHTML = '', 3000);
        }
        
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) showAlert(error.message, 'error');
            else window.location.href = 'dashboard.html';
        };
        
        document.getElementById('registerBtn').onclick = async () => {
            const email = prompt('Masukkan email:');
            if (!email) return;
            const password = prompt('Password (minimal 6 karakter):');
            if (!password || password.length < 6) { alert('Password minimal 6 karakter!'); return; }
            const { error } = await sb.auth.signUp({ email, password });
            if (error) showAlert(error.message, 'error');
            else showAlert('Pendaftaran berhasil! Silakan login.', 'success');
        };
    </script>
</body>
</html>
